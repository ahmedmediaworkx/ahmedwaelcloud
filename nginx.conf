server {
    listen 80;
    server_name localhost;

    # Point to directory where build outputs are placed
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression configuration for faster page load times over network
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Robust modern security headers matching high-grade operational criteria
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' https: data:; connect-src 'self' https:;" always;

    # Support modern single-page application (SPA) client-side routing
    # This ensures that deep links refresh without throwing 404 errors
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caching rules for static bundle assets for optimization
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Custom graceful error handling boundaries
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
